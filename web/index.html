<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x-ui Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        header h1 {
            color: #e94560;
            font-size: 2.5em;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #e94560;
        }
        .stat-card h3 {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #fff;
        }
        .clients {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .clients h2 {
            color: #e94560;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #0f3460;
            color: #fff;
        }
        tr:hover {
            background: #1a1a3e;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-success { background: #0f3460; color: #fff; }
        .btn-danger { background: #c0392b; color: #fff; }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 5px;
            background: #0f3460;
            color: #fff;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
        }
        .close:hover { color: #fff; }
        .links {
            background: #0f3460;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            word-break: break-all;
        }
        .links code {
            color: #4ade80;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>3x-ui Panel</h1>
            <p>Управление VPN сервером</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <h3>Статус сервера</h3>
                <div class="value" id="status">🟢 Online</div>
            </div>
            <div class="stat-card">
                <h3>Активные клиенты</h3>
                <div class="value" id="clients-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Порт VLESS</h3>
                <div class="value" id="vless-port">443</div>
            </div>
            <div class="stat-card">
                <h3>Версия Xray</h3>
                <div class="value" id="xray-version">v1.8.0</div>
            </div>
        </div>

        <div class="clients">
            <h2>Клиенты</h2>
            <button class="btn btn-primary" onclick="openModal()">+ Добавить клиента</button>
            <br><br>
            <table>
                <thead>
                    <tr>
                        <th>Имя</th>
                        <th>UUID</th>
                        <th>Протокол</th>
                        <th>Порт</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="clients-table">
                    <tr>
                        <td colspan="6" style="text-align:center; color:#aaa;">Нет клиентов</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color:#e94560; margin-bottom:20px;">Новый клиент</h2>
            <form id="client-form">
                <div class="form-group">
                    <label>Имя клиента</label>
                    <input type="text" id="client-name" required placeholder="Например: user1">
                </div>
                <div class="form-group">
                    <label>Протокол</label>
                    <select id="client-protocol">
                        <option value="vless">VLESS + Reality</option>
                        <option value="vmess">VMess + TLS</option>
                        <option value="trojan">Trojan + TLS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Порт (авто или вручную)</label>
                    <input type="text" id="client-port" placeholder="443 или auto">
                </div>
                <div class="form-group">
                    <label>SNI (для Reality)</label>
                    <input type="text" id="client-sni" value="google.com">
                </div>
                <button type="submit" class="btn btn-primary">Создать</button>
            </form>
            <div id="result" class="links" style="display:none;">
                <h4 style="color:#4ade80; margin-bottom:10px;">Ссылки для подключения:</h4>
                <code id="links-output"></code>
            </div>
        </div>
    </div>

    <script>
        // Модальное окно
        function openModal() {
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            document.getElementById('client-form').reset();
        }

        // Генерация UUID
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Создание клиента
        document.getElementById('client-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('client-name').value;
            const protocol = document.getElementById('client-protocol').value;
            const port = document.getElementById('client-port').value || '443';
            const sni = document.getElementById('client-sni').value;
            const uuid = generateUUID();
            const ip = window.location.hostname;
            
            let link = '';
            if (protocol === 'vless') {
                link = `vless://${uuid}@${ip}:${port}?encryption=none&security=reality&sni=${sni}&fp=chrome&type=tcp&flow=xtls-rprx-vision#${name}`;
            } else if (protocol === 'vmess') {
                const vmess = btoa(JSON.stringify({
                    v: "2", ps: name, add: ip, port: port,
                    id: uuid, aid: "0", net: "tcp",
                    type: "none", security: "tls"
                }));
                link = `vmess://${vmess}`;
            } else {
                link = `trojan://${uuid}@${ip}:${port}?security=tls&sni=${ip}#${name}`;
            }
            
            document.getElementById('links-output').textContent = link;
            document.getElementById('result').style.display = 'block';
            
            // Обновление таблицы
            addClientToTable(name, uuid, protocol, port);
        });

        // Добавление клиента в таблицу
        function addClientToTable(name, uuid, protocol, port) {
            const tbody = document.getElementById('clients-table');
            
            // Удалить "Нет клиентов"
            if (tbody.children[0] && tbody.children[0].children.length === 1) {
                tbody.innerHTML = '';
            }
            
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${name}</td>
                <td><code>${uuid}</code></td>
                <td>${protocol.toUpperCase()}</td>
                <td>${port}</td>
                <td>🟢 Active</td>
                <td>
                    <button class="btn btn-success" onclick="copyLink('${uuid}')">Копировать</button>
                    <button class="btn btn-danger" onclick="deleteClient(this)">Удалить</button>
                </td>
            `;
            tbody.appendChild(row);
            
            document.getElementById('clients-count').textContent = tbody.children.length;
        }

        // Удаление клиента
        function deleteClient(btn) {
            btn.closest('tr').remove();
            const tbody = document.getElementById('clients-table');
            document.getElementById('clients-count').textContent = tbody.children.length;
        }

        // Копирование ссылки
        function copyLink(uuid) {
            alert('UUID скопирован: ' + uuid);
        }

        // Закрытие модального окна при клике вне его
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
